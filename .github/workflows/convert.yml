name: Convert spaces to PNG

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pillow

      - run: python convert.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: result-image
          path: a.png